<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Fondo crema -->
  <rect width="1584" height="396" fill="#F5EFE6"/>

  <!-- Logo terminal a la izquierda (más grande) -->
  <g transform="translate(120, 130)">
    <!-- Prompt > -->
    <path d="M 12 25 L 35 65 L 12 105"
      stroke="#B8530F"
      stroke-width="9"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- CM -->
    <text x="55" y="93"
      font-family="'JetBrains Mono', 'Courier New', monospace"
      font-weight="700"
      font-size="70"
      fill="#B8530F"
      letter-spacing="2">CM</text>

    <!-- Cursor -->
    <rect x="210" y="33" width="11" height="60" fill="#B8530F">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Separador vertical sutil -->
  <line x1="430" y1="130" x2="430" y2="266" stroke="#B8530F" stroke-width="1.5" opacity="0.3"/>

  <!-- Wordmark y tagline -->
  <text x="470" y="180"
    font-family="'Inter', sans-serif"
    font-weight="800"
    font-size="84"
    fill="#2A1D12"
    letter-spacing="-0.03em">Code<tspan fill="#B8530F">Mar</tspan></text>

  <text x="470" y="230"
    font-family="'Inter', sans-serif"
    font-weight="400"
    font-size="28"
    fill="#5C4A38">Sistemas y sitios web a medida.</text>

  <text x="470" y="268"
    font-family="'JetBrains Mono', monospace"
    font-weight="500"
    font-size="17"
    fill="#8A7A5F"
    letter-spacing="0.2em">MAR DEL PLATA · ARGENTINA</text>

  <!-- Elemento decorativo a la derecha: snippet de código -->
  <g transform="translate(1140, 90)" opacity="0.3">
    <text x="0" y="25" font-family="'JetBrains Mono', monospace" font-size="16" fill="#B8530F">const estudio = {</text>
    <text x="25" y="55" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5C4A38">nombre: <tspan fill="#B8530F">'CodeMar'</tspan>,</text>
    <text x="25" y="85" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5C4A38">ciudad: <tspan fill="#B8530F">'Mar del Plata'</tspan>,</text>
    <text x="25" y="115" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5C4A38">estado: <tspan fill="#10B981">'disponible'</tspan>,</text>
    <text x="25" y="145" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5C4A38">stack: [<tspan fill="#B8530F">'Angular'</tspan>,</text>
    <text x="85" y="175" font-family="'JetBrains Mono', monospace" font-size="16" fill="#B8530F">'Node.js', 'Java', ...]</text>
    <text x="0" y="205" font-family="'JetBrains Mono', monospace" font-size="16" fill="#B8530F">}</text>
  </g>
</svg>
